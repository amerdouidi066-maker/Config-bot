version: '3.8'
services:
  shadow-legion:
    build: .
    container_name: shadow_legion
    restart: always
    environment:
      - TOKEN=${TOKEN}
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-shadow_legion}
      - SHELL_TIMEOUT=${SHELL_TIMEOUT:-600}
      - PORT=${PORT:-8080}
      - WEB_PASSWORD=${WEB_PASSWORD:-shadow2099}
    ports:
      - "8080:8080"
    volumes:
      - ./recordings:/app/recordings
      - ./cookies_live.json:/app/cookies_live.json